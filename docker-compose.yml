services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - gpu-worker

  gpu-worker:
    build:
      context: .
      dockerfile: docker/gpu-worker.Dockerfile
    ports:
      - "8100:8100"
    env_file: .env
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
