services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/data
      - ./apps/api:/app
    environment:
      - SAMPLE_TREE_PATH=/data/atlas_mastery_tree_sample.json
    depends_on:
      - gpu-worker

  gpu-worker:
    build:
      context: .
      dockerfile: docker/gpu-worker.Dockerfile
    ports:
      - "8100:8100"
    env_file: .env
    # AMD ROCm device mounts — only available on Linux hosts with ROCm drivers.
    # On Windows/macOS dev machines (or when LLM_PROVIDER=openai), comment
    # these three lines out so Docker Desktop doesn't error on missing /dev/kfd.
    # Uncomment for actual AMD GPU submission hardware:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video
