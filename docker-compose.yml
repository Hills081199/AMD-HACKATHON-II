services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/data
      - ./apps/api:/app
    environment:
      - SAMPLE_TREE_PATH=/data/generated/demo_tree.generated.json
      - DB_URL=postgresql://postgres:postgres@db:5432/atlas
    depends_on:
      - gpu-worker
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=atlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  gpu-worker:
    build:
      context: .
      dockerfile: docker/gpu-worker.Dockerfile
    ports:
      - "8100:8100"
    env_file: .env
    # AMD ROCm device mounts — only available on Linux hosts with ROCm drivers.
    # On Windows/macOS dev machines (or when LLM_PROVIDER=openai), comment
    # these three lines out so Docker Desktop doesn't error on missing /dev/kfd.
    # Uncomment for actual AMD GPU submission hardware:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video

  ai-quiz-service:
    build:
      context: ./packages/ai-quiz-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  pgdata:
